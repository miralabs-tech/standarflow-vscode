name: release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Publish as a pre-release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    name: package + publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version
        id: ver
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Guard against an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release ${{ steps.ver.outputs.tag }} already exists — bump the version in package.json first."
            exit 1
          fi

      - name: Typecheck
        run: bun run compile

      - name: Package the extension
        run: |
          bunx @vscode/vsce package --no-dependencies --no-rewrite-relative-links \
            ${{ inputs.prerelease && '--pre-release' || '' }} \
            -o standarflow.vsix

      - name: Publish to the VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          bunx @vscode/vsce publish --packagePath standarflow.vsix \
            ${{ inputs.prerelease && '--pre-release' || '' }}

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          bunx ovsx publish standarflow.vsix \
            ${{ inputs.prerelease && '--pre-release' || '' }}

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "standarflow ${{ steps.ver.outputs.version }}" \
            --notes "Extension ${{ steps.ver.outputs.tag }} published to the VS Code Marketplace and Open VSX." \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            standarflow.vsix
